version: '3.8'

services:
  postgres-order:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ordersdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"

  postgres-stock:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: stockdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"  # другой порт для Stock

  postgres-payment:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5434:5432"

  postgres-product:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5435:5432"

  kafka:
    image: lensesio/fast-data-dev:latest
    environment:
      ADV_HOST: localhost
      RUNTESTS: 0
      FORWARDLOGS: 0
      SAMPLEDATA: 0
    ports:
      - "9092:9092"  # Kafka
      - "2181:2181"  # Zookeeper
      - "8081:8081"  # Schema Registry
      - "3030:3030"  # Kafka UI
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      
  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"